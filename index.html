<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>다윗 성경 퀴즈 대회 - 메인 화면</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="screen-main">
  <!-- ====== 메인(프로젝터) 화면 6:4 비율 ====== -->
  <div class="stage-wrap">
    <div class="stage" id="stage">

      <!-- 상단 로고 바 -->
      <header class="topbar">
        <div class="logo">
          <span class="logo-david">DAVID</span>
          <span class="logo-quiz">BIBLE QUIZ</span>
        </div>
        <div class="topbar-right">
          <div class="qnum" id="qnum"></div>
        </div>
      </header>

      <!-- 대기 화면 (시작 전) -->
      <section class="view view-lobby" id="view-lobby">
        <h1 class="lobby-title">다윗 성경 퀴즈 대회</h1>
        <p class="lobby-sub">말씀을 알고, 믿음을 세우는 시간!</p>
        <div class="qr-box">
          <div class="qr-img" id="qr-lobby"></div>
          <p class="qr-text">휴대폰으로 QR코드를 스캔해<br/>참여하세요!</p>
        </div>
        <div class="players-count" id="lobby-players">참여자 0명</div>
      </section>

      <!-- 문제 화면 -->
      <section class="view view-question hidden" id="view-question">
        <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
        <div class="timer-num" id="timer-num">30</div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options"></div>
      </section>

      <!-- 정답 공개 화면 -->
      <section class="view view-reveal hidden" id="view-reveal">
        <div class="reveal-answer" id="reveal-answer"></div>
        <div class="reveal-stat" id="reveal-stat"></div>
      </section>

      <!-- 순위 화면 -->
      <section class="view view-rank hidden" id="view-rank">
        <h2 class="rank-title">현재 순위</h2>
        <ol class="rank-list" id="rank-list"></ol>
      </section>

      <!-- 최종 결과 -->
      <section class="view view-final hidden" id="view-final">
        <h2 class="rank-title">🏆 최종 순위 🏆</h2>
        <ol class="rank-list rank-final" id="final-list"></ol>
      </section>

    </div>
  </div>

  <!-- 진행자(호스트) 컨트롤 -->
  <div class="host-panel" id="host-panel">
    <button id="btn-host-toggle" class="host-toggle">진행 패널 ▲</button>
    <div class="host-body" id="host-body">
      <div class="host-row">
        <button id="btn-start">대회 시작/리셋</button>
        <button id="btn-show-q">문제 보이기</button>
        <button id="btn-show-opt">보기 공개</button>
        <button id="btn-reveal">정답 공개</button>
        <button id="btn-rank">순위 보기</button>
        <button id="btn-next">다음 문제 ▶</button>
        <button id="btn-final">최종 결과</button>
      </div>
      <div class="host-info" id="host-info"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <!-- QR 코드 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="questions.js"></script>
  <script src="main.js"></script>
</body>
</html>
